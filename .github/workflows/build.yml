name: Build VNT Caller APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install build tools
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          sudo mv gradle-8.4 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: /opt/gradle/bin/gradle assembleDebug --no-daemon --project-dir $GITHUB_WORKSPACE

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VNTCaller-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
